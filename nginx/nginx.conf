# ── VinoManager — Nginx Reverse Proxy ────────────────────────────────────
#
# HTTP (porta 80) → risponde direttamente
# HTTPS (porta 443) → decommenta il blocco ssl sotto e commenta il blocco http-only
#
# Per Let's Encrypt:
#   certbot certonly --nginx -d tuodominio.com
#   poi imposta ssl_certificate / ssl_certificate_key

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

# ── Rate limiting (anti-brute-force sul login admin) ──────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ────────────────────────────────────────────────────────────────────────────
# SERVER HTTP
# ────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;          # sostituisci con il tuo dominio es: tuodominio.com

    # ── Redirect a HTTPS (decommenta quando hai il certificato) ──────────
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    # Gzip globale
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── /api/ → Django backend ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  120s;
    }

    # ── /ws/ → WebSocket Django Channels ────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── /admin/ → Django admin (solo backend) ───────────────────────────
    location /admin/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /static/ → file statici Django (collectstatic) ──────────────────
    location /static/ {
        alias /vol/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── / → Frontend React (Nginx interno) ──────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

